services:
  postgres:
    image: postgres:16
    container_name: foxtrade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foxtrade
      POSTGRES_PASSWORD: foxtrade
      POSTGRES_DB: foxtrade
    ports:
      - "5432:5432"
    volumes:
      - foxtrade_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxtrade -d foxtrade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: foxtrade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - foxtrade_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  foxtrade_postgres_data:
  foxtrade_redis_data: